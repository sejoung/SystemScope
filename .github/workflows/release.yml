name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "${TAG_NAME}" != "v${PKG_VERSION}" ]]; then
            echo "Tag ${TAG_NAME} does not match package.json version v${PKG_VERSION}" >&2
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build:
    name: Build (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run dist:mac
          - os: windows-latest
            build_cmd: npm run dist:win
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: ${{ matrix.build_cmd }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/SHA256SUMS.txt
