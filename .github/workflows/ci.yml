name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      # Cache the Electron binary download so the E2E launch is reliable and fast.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci --prefer-offline --no-audit
      # Playwright launches the real Electron binary, which `npm ci` may skip when the
      # runner environment globally sets ELECTRON_SKIP_BINARY_DOWNLOAD. `env -u` removes
      # that var for this process so install.js actually downloads (and, if the download
      # is genuinely blocked, it exits non-zero with the real error instead of silently
      # skipping). force_no_cache avoids reusing a partial cached artifact.
      - name: Ensure Electron binary is installed
        shell: bash
        run: |
          echo "inherited ELECTRON_SKIP_BINARY_DOWNLOAD=[${ELECTRON_SKIP_BINARY_DOWNLOAD-<unset>}]"
          env -u ELECTRON_SKIP_BINARY_DOWNLOAD force_no_cache=true node node_modules/electron/install.js
          if [ ! -f node_modules/electron/path.txt ]; then
            echo "::error::Electron binary still missing after a forced download — the download host is unreachable from this runner."
            ls -la node_modules/electron/ || true
            exit 1
          fi
          echo "Electron binary OK: $(cat node_modules/electron/path.txt)"
      - run: npm run test:e2e:build
        env:
          DEBUG: pw:browser*
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 1
