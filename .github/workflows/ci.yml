name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      # Cache the Electron binary download so the E2E launch is reliable and fast.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci --prefer-offline --no-audit
      # DIAGNOSTIC: report exactly why the Electron binary download fails on this
      # runner. Prints the HTTP status from the GitHub release CDN and the npmmirror,
      # plus @electron/get debug. Never fails the job, so the full picture is visible.
      #   - HTTP 403/429  -> rate limit (fixable: token/retry/mirror)
      #   - timeout/refused/could-not-resolve -> network block (infra issue)
      #   - HTTP 200 + correct size but install.js still fails -> @electron/get issue
      - name: Diagnose Electron download
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          VER=$(node -p "require('electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            darwin) FILE="electron-v${VER}-darwin-${ARCH}.zip" ;;
            win32)  FILE="electron-v${VER}-win32-${ARCH}.zip" ;;
            *)      FILE="electron-v${VER}-linux-${ARCH}.zip" ;;
          esac
          echo "version=$VER platform=$PLAT arch=$ARCH file=$FILE"
          GH="https://github.com/electron/electron/releases/download/v${VER}/${FILE}"
          MR="https://npmmirror.com/mirrors/electron/${VER}/${FILE}"
          echo "--- curl GitHub release CDN ---"
          curl -sSL --retry 2 --max-time 90 -o /tmp/gh.zip \
            -w "github => HTTP=%{http_code} size=%{size_download} time=%{time_total}s final=%{url_effective}\n" "$GH"
          echo "curl-exit=$?"
          echo "--- curl npmmirror CDN ---"
          curl -sSL --retry 2 --max-time 90 -o /tmp/mr.zip \
            -w "mirror => HTTP=%{http_code} size=%{size_download} time=%{time_total}s final=%{url_effective}\n" "$MR"
          echo "curl-exit=$?"
          echo "--- install.js (clean, @electron/get debug) ---"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          env -u ELECTRON_SKIP_BINARY_DOWNLOAD DEBUG='@electron/get*' node node_modules/electron/install.js
          echo "install.js-exit=$?"
          echo "path.txt: $([ -f node_modules/electron/path.txt ] && cat node_modules/electron/path.txt || echo MISSING)"
          set -e
      - run: npm run test:e2e:build
        env:
          DEBUG: pw:browser*
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 1
