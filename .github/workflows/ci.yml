name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run bundle:size

  e2e:
    name: E2E (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      # The download itself works fine on the runner (full 116MB, HTTP 200), but
      # electron's install.js can finish without writing path.txt (its extract step
      # silently no-ops on the macOS app bundle / a stale @electron/get cache), which
      # makes Playwright report "Electron failed to install correctly". Try install.js
      # first; if path.txt is still missing, download and extract the binary manually
      # (system unzip handles the .app symlinks) and write path.txt ourselves.
      - name: Install Electron binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DEST=node_modules/electron
          rm -rf "$DEST/dist" "$DEST/path.txt" ~/.cache/electron ~/Library/Caches/electron
          env -u ELECTRON_SKIP_BINARY_DOWNLOAD force_no_cache=true node "$DEST/install.js" || true
          if [ -f "$DEST/path.txt" ]; then
            echo "Electron installed via install.js: $(cat "$DEST/path.txt")"
            exit 0
          fi
          echo "install.js did not produce path.txt — extracting manually"
          VER=$(node -p "require('electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            darwin) FILE="electron-v${VER}-darwin-${ARCH}.zip"; REL="Electron.app/Contents/MacOS/Electron" ;;
            win32)  FILE="electron-v${VER}-win32-${ARCH}.zip";  REL="electron.exe" ;;
            *)      FILE="electron-v${VER}-linux-${ARCH}.zip";  REL="electron" ;;
          esac
          curl -sSL --retry 3 --max-time 180 -o /tmp/electron.zip \
            "https://github.com/electron/electron/releases/download/v${VER}/${FILE}"
          mkdir -p "$DEST/dist"
          if command -v unzip >/dev/null 2>&1; then
            unzip -q -o /tmp/electron.zip -d "$DEST/dist"
          else
            tar -xf /tmp/electron.zip -C "$DEST/dist"
          fi
          printf '%s' "$REL" > "$DEST/path.txt"
          test -x "$DEST/dist/$REL" || test -f "$DEST/dist/$REL"
          echo "Electron installed manually: $(cat "$DEST/path.txt")"
      - run: npm run test:e2e:build
        env:
          DEBUG: pw:browser*
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 1
