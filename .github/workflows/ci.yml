name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README.ko.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      # Cache the Electron binary download so the E2E launch is reliable and fast.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci --prefer-offline --no-audit
      # Playwright launches the real Electron binary. Downloading it from GitHub
      # Releases is rate-limited / flaky on shared CI runners (partial downloads),
      # so retry a few times against GitHub, then fall back to the npmmirror CDN.
      # Each attempt starts clean so a partial/truncated artifact can't be reused.
      - name: Ensure Electron binary is installed
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          try_install() {
            rm -rf node_modules/electron/dist node_modules/electron/path.txt
            env -u ELECTRON_SKIP_BINARY_DOWNLOAD force_no_cache=true ${1:+ELECTRON_MIRROR="$1"} \
              node node_modules/electron/install.js || true
            [ -f node_modules/electron/path.txt ]
          }
          for i in 1 2 3; do
            if try_install ""; then break; fi
            echo "GitHub download attempt $i failed; retrying..."
            sleep 5
          done
          if [ ! -f node_modules/electron/path.txt ]; then
            echo "Falling back to npmmirror Electron CDN..."
            try_install "https://npmmirror.com/mirrors/electron/" || true
          fi
          if [ ! -f node_modules/electron/path.txt ]; then
            echo "::error::Electron binary unavailable from GitHub and the mirror."
            ls -la node_modules/electron/ || true
            exit 1
          fi
          echo "Electron binary OK: $(cat node_modules/electron/path.txt)"
      - run: npm run test:e2e:build
        env:
          DEBUG: pw:browser*
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 1
